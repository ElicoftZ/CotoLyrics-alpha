<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lyric Speaker</title>
    <style>
      *,
      *::before,
      *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; }
      #three-canvas { display: block; width: 100vw; height: 100vh; }

      #ui-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 10;
        font-family: "Helvetica Neue", Arial, sans-serif; }

      #song-info { position: absolute; top: 34px; left: 44px; opacity: 0; transition: opacity 0.8s ease, color 0.6s ease; }
      #song-info.visible { opacity: 1; }
      #song-title { font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }
      #song-artist { font-size: 10px; font-weight: 400; letter-spacing: 0.14em; margin-top: 5px; opacity: 0.6; }

      #status-bar { position: absolute; bottom: 30px; right: 44px; font-size: 9px;
        letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.5; transition: color 0.6s ease; }

      /* Settings gear + panel — pinned bottom-right by the status bar. #ui-overlay
         is pointer-events:none, so the interactive bits re-enable pointer events. */
      #settings-btn { position: absolute; bottom: 22px; right: 14px; width: 22px; height: 22px;
        pointer-events: auto; cursor: pointer; background: none; border: none; color: #1a1a1a;
        font-size: 15px; line-height: 22px; opacity: 0.45; transition: opacity 0.3s ease; }
      #settings-btn:hover { opacity: 0.9; }
      #settings-panel { position: absolute; bottom: 52px; right: 14px; pointer-events: auto;
        min-width: 210px; background: #fff; border: 1px solid rgba(0,0,0,0.12); border-radius: 4px;
        box-shadow: 0 6px 24px rgba(0,0,0,0.14); padding: 14px 16px; color: #1a1a1a;
        font-size: 11px; letter-spacing: 0.06em; }
      #settings-panel.hidden { display: none; }
      #settings-panel .settings-title { font-size: 9px; letter-spacing: 0.22em;
        text-transform: uppercase; opacity: 0.5; margin-bottom: 12px; }
      #settings-panel .settings-row { display: flex; justify-content: space-between;
        align-items: baseline; gap: 14px; margin-bottom: 12px; }
      #settings-panel .settings-label { font-size: 9px; letter-spacing: 0.18em;
        text-transform: uppercase; opacity: 0.55; }
      #settings-panel #font-name { font-weight: 700; text-align: right; max-width: 130px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #settings-panel #font-upload-btn { width: 100%; padding: 7px 10px; cursor: pointer;
        background: #1a1a1a; color: #fff; border: none; border-radius: 3px; font-size: 10px;
        letter-spacing: 0.16em; text-transform: uppercase; transition: opacity 0.3s ease; }
      #settings-panel #font-upload-btn:hover { opacity: 0.85; }

      #start-prompt { position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; pointer-events: none; transition: opacity 1.2s ease; }
      #start-prompt.hidden { opacity: 0; }
      #start-prompt h1 { font-size: 20px; font-weight: 300; letter-spacing: 0.42em;
        text-transform: uppercase; margin-bottom: 26px; }
      #start-prompt p { font-size: 11px; letter-spacing: 0.18em; line-height: 2; text-align: center;
        max-width: 480px; opacity: 0.55; }

      #progress-bar-wrap { position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
        background: rgba(128,128,128,0.18); pointer-events: none; }
      #progress-bar-fill { height: 100%; width: 0%; transition: width 0.25s linear; }

      #error-toast { position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.82); color: #fff; font-size: 11px; letter-spacing: 0.1em;
        padding: 9px 22px; border-radius: 2px; opacity: 0; pointer-events: none;
        transition: opacity 0.4s ease; white-space: nowrap; }
      #error-toast.visible { opacity: 1; }

      @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.7; } }
      .searching { animation: pulse 2.4s infinite ease-in-out; }

      /* ── APPLE MUSIC MODE — DOM scrolling-lyrics overlay (white theme) ──────
         Shown only when the Settings toggle is ON; replaces the Three.js canvas.
         Montserrat (same faces the canvas uses) for matching typography. */
      @font-face { font-family: "MontserratAM"; font-weight: 300; font-display: swap;
        src: url("https://cdn.jsdelivr.net/npm/@expo-google-fonts/montserrat/Montserrat_300Light.ttf") format("truetype"); }
      @font-face { font-family: "MontserratAM"; font-weight: 700; font-display: swap;
        src: url("https://cdn.jsdelivr.net/npm/@expo-google-fonts/montserrat/Montserrat_700Bold.ttf") format("truetype"); }
      @font-face { font-family: "MontserratAM"; font-weight: 900; font-display: swap;
        src: url("https://cdn.jsdelivr.net/npm/@expo-google-fonts/montserrat/Montserrat_900Black.ttf") format("truetype"); }

      #am-lyrics { position: fixed; inset: 0; z-index: 5; background: #ffffff;
        overflow: hidden; pointer-events: none; }
      #am-lyrics.hidden { display: none; }
      #am-lyrics-inner { position: absolute; top: 50%; left: 0; right: 0; width: 100%;
        text-align: center; padding: 0 8vw; will-change: transform; }
      .am-line { font-family: "MontserratAM","Helvetica Neue",Arial,sans-serif;
        font-weight: 700; font-size: clamp(22px, 4.2vw, 52px); line-height: 1.3;
        letter-spacing: -0.01em; opacity: 0.4; transform: scale(0.98); transform-origin: center;
        transition: opacity 0.45s ease, transform 0.45s ease; margin: 0.2em 0;
        will-change: transform, filter; }
      .am-line.past { opacity: 0.5; }
      .am-line.active { opacity: 1; font-weight: 800; transform: scale(1.05); }
      /* Per-word karaoke wipe: a hard charcoal→gray stop at --fill, clipped to glyphs. */
      .am-word { display: inline-block; color: transparent; -webkit-text-fill-color: transparent;
        background-image: linear-gradient(90deg, #141414 var(--fill,0%), #bdbdbd var(--fill,0%));
        -webkit-background-clip: text; background-clip: text; transition: transform 0.18s ease; }
      .am-line.active .am-word.cur { transform: scale(1.06); }
      #am-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; font-family: "MontserratAM",Arial,sans-serif;
        color: #c4c4c4; gap: 14px; }
      #am-placeholder .am-ph-title { font-size: 16px; font-weight: 700; letter-spacing: 0.2em;
        text-transform: uppercase; color: #9a9a9a; }
      #am-placeholder .am-ph-note { font-size: 34px; }

      /* Settings toggle switch */
      .am-switch { position: relative; display: inline-block; width: 34px; height: 18px; pointer-events: auto; }
      .am-switch input { position: absolute; opacity: 0; width: 0; height: 0; }
      .am-switch .am-track { display: block; width: 34px; height: 18px; border-radius: 9px;
        background: #d0d0d0; position: relative; transition: background 0.2s ease; cursor: pointer; }
      .am-switch .am-track::after { content: ""; position: absolute; top: 2px; left: 2px;
        width: 14px; height: 14px; border-radius: 50%; background: #fff;
        box-shadow: 0 1px 2px rgba(0,0,0,0.3); transition: left 0.2s ease; }
      .am-switch input:checked + .am-track { background: #1a1a1a; }
      .am-switch input:checked + .am-track::after { left: 18px; }
    </style>

    <script type="importmap">
      { "imports": { "three": "/node_modules/three/build/three.module.js" } }
    </script>
  </head>

  <body>
    <canvas id="three-canvas"></canvas>
    <div id="am-lyrics" class="hidden"><div id="am-lyrics-inner"></div></div>

    <div id="ui-overlay">
      <div id="song-info">
        <div id="song-title">—</div>
        <div id="song-artist">—</div>
      </div>
      <div id="start-prompt">
        <h1>Lyric Speaker</h1>
        <p id="prompt-desc" class="searching">
          Listening for music…<br />
          Play a track in Spotify, Apple Music, or any browser on this PC.
        </p>
      </div>
      <div id="status-bar">Listening</div>
      <button id="settings-btn" type="button" title="Settings" aria-label="Settings">⚙</button>
      <div id="settings-panel" class="hidden">
        <div class="settings-title">Settings</div>
        <div class="settings-row">
          <span class="settings-label">Apple Music Lyrics</span>
          <label class="am-switch"><input id="apple-toggle" type="checkbox" /><span class="am-track"></span></label>
        </div>
        <div class="settings-row">
          <span class="settings-label">On-device AI</span>
          <label class="am-switch"><input id="ai-toggle" type="checkbox" /><span class="am-track"></span></label>
        </div>
        <div class="settings-row">
          <span class="settings-label">Font</span>
          <span id="font-name">Montserrat</span>
        </div>
        <button id="font-upload-btn" type="button">Upload font…</button>
        <input id="font-file" type="file" accept=".ttf,.otf" hidden />
      </div>
      <div id="progress-bar-wrap"><div id="progress-bar-fill"></div></div>
      <div id="error-toast"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <!-- Robust live tempo estimator (Layer 3). Classic script so window.BpmEstimator
         is defined before the deferred module below runs (same pattern as opentype). -->
    <script src="/bpm-estimator.js"></script>

    <script type="module">
      "use strict";
      import * as THREE from "three";
      import { sampleMood, moodToMotion, lyricTheme, classifyTheme, classifyVibe } from "/mood-engine.js";

      /* ── § 1  DOM ─────────────────────────────────────────────────────── */
      const canvas = document.getElementById("three-canvas");
      const startPrompt = document.getElementById("start-prompt");
      const promptDesc = document.getElementById("prompt-desc");
      const statusBar = document.getElementById("status-bar");
      const songInfo = document.getElementById("song-info");
      const songTitleEl = document.getElementById("song-title");
      const songArtistEl = document.getElementById("song-artist");
      const progressFill = document.getElementById("progress-bar-fill");
      const errorToast = document.getElementById("error-toast");
      const settingsBtn = document.getElementById("settings-btn");
      const settingsPanel = document.getElementById("settings-panel");
      const fontUploadBtn = document.getElementById("font-upload-btn");
      const fontFileInput = document.getElementById("font-file");
      const fontNameEl = document.getElementById("font-name");
      const threeCanvas = document.getElementById("three-canvas");
      const amLyrics = document.getElementById("am-lyrics");
      const amInner = document.getElementById("am-lyrics-inner");
      const appleToggle = document.getElementById("apple-toggle");
      const aiToggle = document.getElementById("ai-toggle");

      /* ── § 2  CONSTANTS ──────────────────────────────────────────────── */
      // Mood-themed type families (static TTFs opentype.js can parse).
      const F = {
        montLight: "https://cdn.jsdelivr.net/npm/@expo-google-fonts/montserrat/Montserrat_300Light.ttf",
        montBold: "https://cdn.jsdelivr.net/npm/@expo-google-fonts/montserrat/Montserrat_700Bold.ttf",
        montBlack: "https://cdn.jsdelivr.net/npm/@expo-google-fonts/montserrat/Montserrat_900Black.ttf",
        cormLight: "https://cdn.jsdelivr.net/npm/@expo-google-fonts/cormorant/Cormorant_300Light.ttf",
        cormBold: "https://cdn.jsdelivr.net/npm/@expo-google-fonts/cormorant/Cormorant_600SemiBold.ttf",
        // CJK fallback (single weight, ~8.6 MB) — lazy-loaded only if Japanese appears.
        cjk: "https://fonts.gstatic.com/s/shipporimincho/v15/VdGGAZweH5EbgHY6YExcZfDoj0BA2_-C7LoS7g.ttf",
      };
      // Vibe profile -> { light, heavy } font URLs (A calm serif … D heavy sans).
      // C & D are BOLD globally (even non-active words) per the heavy-panel look.
      const PROFILE_FONTS = {
        A: { light: F.cormLight, heavy: F.cormBold },  // Melancholy/Calm — elegant serif
        B: { light: F.montLight, heavy: F.montBlack }, // Chill/Groovy — semibold sans
        C: { light: F.montBold, heavy: F.montBlack },  // High-energy — bold → black
        D: { light: F.montBold, heavy: F.montBlack },  // Aggressive — bold → heaviest
      };

      // ── DUAL-LAYER TEXT (base character + offset shadow/tint duplicate) ────
      const FRONT_Z = 0.18;      // front-text plane (parallax foreground)
      const SHADOW_DX = 0.05;    // TIGHT drop-shadow offset — reads as depth, never a twin
      const SHADOW_DY = -0.06;
      const SHADOW_DZ = -0.22;   // kept close so a 3D tilt can't split it off the glyph
      const FRONT_ALPHA = 0.85;  // translucent acrylic sheen (dark cutout on white)
      const SHADOW_ALPHA = 0.3;  // subordinate drop shadow

      const CHAR_SIZE = 1.15; // base em-size (world units)
      const CURVE_SEGS = 4;
      const SEEK_JUMP_SEC = 0.4;
      const DIM_OPACITY = 0.4;
      const FUTURE_OPACITY = 0; // un-sung words are FULLY hidden (mesh.visible=false) until reached — no pale ghost stack
      const POP_SCALE = 1.5; // "The Pop" multiplier
      const SPRING_K = 220; // Hooke stiffness (dt-based)
      const SPRING_DAMP = 17; // spring damping
      const SLIDE_K = 13; // position-lerp rate (1/s)
      const ROT_K = 12; // rotation-lerp rate
      const OPAC_K = 9; // opacity-lerp rate
      const ENTRANCE_STAGGER = 0.045; // s between word entrances
      const CHAR_STAGGER = 0.028; // s between consecutive letters flying in (used by §9 + §10)
      const REVEAL_RAMP = 0.05; // s — per-letter fade-in ramp for the left→right typewriter reveal
      const ENTRANCE_DUR = 0.42; // s — per-letter APPEARING (entrance) window; the spatial
                                 // animation settles over this, longer than the opacity ramp
      const DISAPPEAR_DUR = 0.45; // s — per-letter DISAPPEAR (exit) window when a line finishes
      const IDLE_W = 0.3; // weight of the subtle post-entrance idle (0 = rest still, 1 = full)
      const EXIT_DRIFT_Z = 2.4; // exit Z-drift (units/s)
      const FRUSTUM_MARGIN = 0.86; // safe-zone fraction of the visible plane
      const CJK_RE = /[぀-ヿ㐀-鿿豈-﫿ｦ-ﾟ]/;
      const NETEASE_API_BASE = ""; // optional NetEase proxy base (see README); "" disables

      // ── PHASE GATE ───────────────────────────────────────────────────────
      // Phase 1 (false): lyrics render FLAT & STATIONARY at the origin — no
      // camera drift, no spring "pop", no slide/spin entrance, no weight-shift,
      // no B/W inversion, no point-cloud motion. This is the clean transparent-
      // panel baseline for verifying audio routing + the single-trigger lock.
      // Flip to true to re-activate the complete Phase 2 Cotodama kinetic suite
      // (all of it lives in applyKineticTransforms() + the camera/bg blocks).
      const ANIMATIONS_ACTIVE = true;

      /* ── § 3  SCENE / CAMERA / RENDERER ──────────────────────────────── */
      const renderer = new THREE.WebGLRenderer({
        canvas, antialias: true, alpha: false, powerPreference: "high-performance",
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 500);
      const CAM_Z = 14;
      camera.position.set(0, 0, CAM_Z);
      camera.lookAt(0, 0, 0);
      // Lit setup so extruded glyph faces + bevels shade under kinetic motion.
      scene.add(new THREE.AmbientLight(0xffffff, 0.72));
      const keyLight = new THREE.DirectionalLight(0xffffff, 0.7);
      keyLight.position.set(0.4, 0.9, 1.4);
      scene.add(keyLight);

      // Black/white inversion state: bgLevel 0 = white bg/dark ink, 1 = black bg/light ink.
      let bgLevel = 0;
      let bgTarget = 0;
      scene.background = new THREE.Color(0xffffff);
      function inkColorAt(level) {
        // dark ink on light bg, light ink on dark bg.
        const v = level < 0.5 ? 0.1 : 0.95;
        return new THREE.Color(v, v, v);
      }
      function applyBg() {
        // STRICT WHITE BACKGROUND at all times, across every profile — never
        // changes or dims, even during intense transitions, for maximum contrast.
        renderer.setClearColor(0xffffff, 1);
        scene.background.setRGB(1, 1, 1);
        const uiInk = "#1a1a1a";
        songInfo.style.color = uiInk;
        statusBar.style.color = uiInk;
        startPrompt.style.color = uiInk;
        progressFill.style.background = uiInk;
      }

      // ── GLOBAL ACRYLIC TINT (invert-aware, reused every frame) ────────────
      // Front = deep saturated charcoal-blue ink (or inverted near-white on a
      // dark panel); shadow = near-black tint duplicate. Both flip cleanly with
      // bgLevel so Profile D's rapid inversions never break the depth illusion.
      // Background is always white, so the ink tint is CONSTANT — a deeply
      // saturated charcoal-blue face with a near-black cast-shadow duplicate.
      // Max contrast, every profile; no inversion.
      const _front = new THREE.Color(0.06, 0.09, 0.17);
      const _shadow = new THREE.Color(0.0, 0.012, 0.05);
      function computeTints() { /* constant tints — nothing to recompute on white */ }
      applyBg();

      /* ── § 4  FRUSTUM BOUNDS + RESIZE REFLEX ─────────────────────────── */
      let halfW = 8, halfH = 5; // visible half-extents at z=0 (recomputed)
      function computeFrustum() {
        const vFOV = THREE.MathUtils.degToRad(camera.fov);
        const h = 2 * Math.tan(vFOV / 2) * CAM_Z;
        const w = h * camera.aspect;
        halfH = (h / 2) * FRUSTUM_MARGIN;
        halfW = (w / 2) * FRUSTUM_MARGIN;
      }
      computeFrustum();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        computeFrustum();
        // Resize reflex: reflow the current line to the new bounds (words glide).
        if (activeLine && activeLine.phrase) relayoutActiveLine();
      });

      /* ── § 5  FONTS (themed weights + lazy CJK) ──────────────────────── */
      const fontCache = new Map(); // url -> opentype.Font
      const fontPending = new Map(); // url -> Promise
      let fontsReady = false;
      // User-uploaded lyrics font (Settings panel). null = use the built-in weight.
      let customFont = null;             // opentype.Font once a custom face is loaded
      let customFontName = "Montserrat"; // shown in the Settings panel

      function loadFont(url) {
        if (fontCache.has(url)) return Promise.resolve(fontCache.get(url));
        if (fontPending.has(url)) return fontPending.get(url);
        const p = new Promise((resolve, reject) => {
          opentype.load(url, (err, font) => (err ? reject(err) : resolve(font)));
        }).then((f) => {
          fontCache.set(url, f);
          fontPending.delete(url);
          return f;
        });
        fontPending.set(url, p);
        return p;
      }

      function isCJK(text) {
        return CJK_RE.test(text || "");
      }

      // SINGLE shared HEAVY-BOLD weight for ALL characters and ALL profiles
      // (no per-word weight swapping). Japanese falls back to the lazy CJK face.
      function fontFor(text) {
        if (isCJK(text)) {
          const cjk = fontCache.get(F.cjk);
          if (cjk) return cjk;
          loadFont(F.cjk).catch(() => {}); // lazy; fall through to Latin meanwhile
        }
        // A user-uploaded font overrides the built-in weight for Latin text. CJK
        // keeps the bundled fallback above, since user fonts rarely carry CJK glyphs.
        if (customFont) return customFont;
        return (
          fontCache.get(F.montBlack) || // heaviest 900 weight — unified across all lyrics
          fontCache.get(F.montBold) ||
          fontCache.get(F.montLight) ||
          null
        );
      }

      /* ── § 6  GLYPH → FLAT ShapeGeometry PIPELINE ────────────────────────
       * opentype glyph outline -> THREE.Shape(s) with holes nested by geometric
       * containment (winding-agnostic) -> FLAT ShapeGeometry (no extruded side
       * faces, so a 3D tilt never catches edge slivers). The flat glyphs are
       * still positioned/rotated freely on X/Y/Z and z-separated for parallax. */
      function glyphAdvance(font, glyph, emSize) {
        return ((glyph.advanceWidth || 0) / font.unitsPerEm) * emSize;
      }
      function kernBetween(font, a, b, emSize) {
        return (font.getKerningValue(a, b) / font.unitsPerEm) * emSize;
      }
      // One glyph -> array of THREE.Shape (with holes resolved), Y-up, at xOffset.
      // We feed opentype's TTF outline into a THREE.ShapePath and let toShapes()
      // nest the holes via proper winding (sampled along the real curves). This is
      // exactly how three's Font.generateShapes() works — robust for EVERY glyph,
      // so inner counters (o, a, b, e) stay open and no letter morphs (t -> l).
      function glyphToShapes(glyph, xOffset, emSize) {
        const cmds = glyph.getPath(xOffset, 0, emSize).commands;
        const sp = new THREE.ShapePath();
        for (const c of cmds) {
          if (c.type === "M") sp.moveTo(c.x, -c.y);
          else if (c.type === "L") sp.lineTo(c.x, -c.y);
          else if (c.type === "Q") sp.quadraticCurveTo(c.x1, -c.y1, c.x, -c.y);
          else if (c.type === "C") sp.bezierCurveTo(c.x1, -c.y1, c.x2, -c.y2, c.x, -c.y);
          // "Z" closes the current sub-path; the next "M" opens a fresh one.
        }
        // After the Y-negation the OUTER contours read clockwise, so the solids
        // are CW -> isCCW = false. (true collapses 'o'/'d'/'p' to filled dots by
        // treating the inner counter as the solid and dropping the outer ring.)
        return sp.toShapes(false);
      }
      // Build DUAL-LAYER glyphs into `group`: per character, ONE flat ShapeGeometry
      // is shared by a FRONT mesh (parallax foreground, z=FRONT_Z) and an offset
      // SHADOW/TINT duplicate (z=SHADOW_DZ, +dx/dy) — the deep cast tint behind
      // each letter. Flat MeshBasicMaterial (tinted per-frame) keeps it cheap and
      // matches the printed-acrylic look. Returns { front, shadow, geo, baseX }.
      function buildGlyphsInto(group, text, font, emSize, tracking) {
        const chars = [];
        const glyphs = font.stringToGlyphs(text || "");
        let penX = 0;
        for (let i = 0; i < glyphs.length; i++) {
          const g = glyphs[i];
          const shapes = glyphToShapes(g, 0, emSize); // build at the glyph's own origin
          if (shapes.length) {
            // FLAT glyph — ShapeGeometry has NO extruded side faces, so a 3D tilt
            // never catches edge slivers. DoubleSide keeps it visible when the
            // phrase angles away from the camera. Front + shadow share one geometry
            // and stay z-separated (FRONT_Z vs SHADOW_DZ) for the parallax depth.
            const geo = new THREE.ShapeGeometry(shapes, CURVE_SEGS);
            const sMat = new THREE.MeshBasicMaterial({ color: _shadow.clone(), transparent: true, opacity: 0, depthWrite: false, side: THREE.DoubleSide });
            const shadow = new THREE.Mesh(geo, sMat);
            shadow.position.set(penX + SHADOW_DX, SHADOW_DY, SHADOW_DZ);
            const fMat = new THREE.MeshBasicMaterial({ color: _front.clone(), transparent: true, opacity: 0, depthWrite: false, side: THREE.DoubleSide });
            const front = new THREE.Mesh(geo, fMat);
            front.position.set(penX, 0, FRONT_Z);
            group.add(shadow);
            group.add(front);
            // `em`/`baseX` let the genre per-letter engine offset each glyph from its
            // static home (baseX) in em-relative units; `seed` lazily set on first anim.
            chars.push({ front, shadow, geo, baseX: penX, em: emSize, seed: 0 });
          }
          // Tracking + kerning apply only BETWEEN glyphs — never a trailing unit
          // after the last glyph, or the word's width overshoots and glued

      /* ── § 7  LINE / WORD POOL + CANVAS CLEAR ────────────────────────────

      /* ── § 8  LAYOUT PROFILES (frustum-aware) ────────────────────────────

        // Swing in on an elastic pendulum, small idle sway (Jazz / Reggae / House / Acid-Jazz / Bossa / Opera).
        swing: (e, t, i, s, P) => { const eo = easeOutElastic(e), ph = t * P.freq * TAU - i * P.stag; return { rot: (1 - eo) * 0.6 + Math.sin(ph) * P.amp * 3 * IDLE_W * e, dx: Math.sin(ph) * P.amp * 0.5 * IDLE_W * e }; },
        // Rise in from below, gentle traveling-wave idle (R&B / Blues / Post-Rock / Gospel / Orchestral).
        wave: (e, t, i, s, P) => { const eo = easeOutCubic(e), ph = t * P.freq * TAU - i * P.stag; return { dy: -(1 - eo) * 0.6 + Math.sin(ph) * P.amp * IDLE_W * e }; },
        // Shake in hard, then calm to a tiny persistent idle jitter (Metal / Punk / Grunge).
        jitter: (e, t, i, s, P) => { const g = 1 - e, bk = Math.floor(t * (10 + P.freq * 8)), amp = P.amp * (0.3 + g * 2.5); return { dx: (rnd(s + i * 5 + bk) - 0.5) * amp, dy: (rnd(s + i * 9 + bk * 2) - 0.5) * amp, rot: (rnd(s + i * 3 + bk * 4) - 0.5) * amp * 2 }; },
        // Quantized / stepped snap-in, robotic, tiny stepped idle (Industrial / Techno / Chiptune / Math-Rock / Bluegrass).
        mechanical: (e, t, i, s, P) => { const eo = Math.floor(e * 4) / 4, g = 1 - eo, idle = (Math.round(Math.sin(t * P.freq * TAU - i * P.stag) * 3) / 3) * P.amp * IDLE_W * e; return { dx: g * 0.5 * (i % 2 ? 1 : -1), dy: g * 0.4 + idle, op: 0.3 + 0.7 * eo }; },
        // Stretch in (elastic horizontal squash/overshoot), small idle (Ska / Dubstep).
        elastic: (e, t, i, s, P) => { const eo = easeOutElastic(e), g = 1 - eo, idle = Math.sin(t * P.freq * TAU - i * P.stag) * P.amp; return { sx: 1 + g * 0.6 + idle * 4 * IDLE_W * e, sy: 1 - g * 0.35 - idle * 2.5 * IDLE_W * e }; },
        // Soft fade + small rise; near-still, keeps calm genres legible (Country / Classical / Indie-Folk / Default).
        staticReveal: (e, t, i, s, P) => { const eo = easeOutCubic(e), ph = t * P.freq * TAU - i * P.stag; return { dy: -(1 - eo) * 0.15 + Math.sin(ph) * P.amp * 0.4 * IDLE_W * e, op: 0.2 + 0.8 * eo }; },

        // ── 4 NEW APPEARING STYLES ──────────────────────────────────────────
        // Fly in from a seeded random direction/distance, snap with overshoot (Hyperpop / Future Bass).
        scatterGather: (e, t, i, s, P) => { const eo = easeOutBack(e), g = 1 - eo, ang = rnd(s + i * 13) * TAU, dist = 1.0 + rnd(s + i * 29) * 0.8; const idle = (rnd(s + Math.floor(t * (8 + P.freq * 6)) + i) - 0.5) * P.amp * IDLE_W * e; return { dx: Math.cos(ang) * dist * g + idle, dy: Math.sin(ang) * dist * g, rot: g * (rnd(s + i * 7) - 0.5) * 2 }; },
        // 3D card flip on the X axis (90°→0), alpha-in, faint flip-breath idle (K-Pop / New Wave).
        flipIn: (e, t, i, s, P) => { const eo = easeOutCubic(e), g = 1 - eo, dir = i % 2 ? 1 : -1; return { rotX: g * (Math.PI * 0.5) * dir + Math.sin(t * P.freq * TAU - i * P.stag) * P.amp * 0.5 * IDLE_W * e, dy: g * 0.1, op: 0.2 + 0.8 * eo }; },
        // Spin (~1.5 turns) while scaling up from tiny, small idle spin-sway (Disco / Ska Punk).
        spinIn: (e, t, i, s, P) => { const eo = easeOutCubic(e), g = 1 - eo, sc = 0.2 + 0.8 * eo, idle = Math.sin(t * P.freq * TAU - i * P.stag) * P.amp * 2 * IDLE_W * e; return { rot: g * Math.PI * 3 * (i % 2 ? 1 : -1) + idle, sx: sc, sy: sc }; },
        // Neon-sign flicker-on: stutter a few times then lock solid with a glow pop, then shimmer (Cyberpunk / Synthwave / Vaporwave).
        neonFlicker: (e, t, i, s, P) => { let op; if (e < 0.78) { const fb = Math.floor(e * 16); op = rnd(s + i * 5 + fb * 11) < 0.45 ? 0.12 : 1; } else { op = 0.9 + 0.1 * (0.5 + 0.5 * Math.sin(t * P.freq * TAU - i * P.stag)); } const pop = e > 0.7 && e < 1 ? Math.sin(((e - 0.7) / 0.3) * Math.PI) * 0.18 : 0; return { op, sx: 1 + pop, sy: 1 + pop }; },

        // ── 10 MORE APPEARING STYLES (calm-leaning; "blur for calm" + friends) ──
        // CALM blur-in: starts heavily faded (≈blur) and slightly drifted, focuses sharp (Ambient).
        softBlur: (e, t, i, s, P) => { const eo = easeOutExpo(e), g = 1 - eo, ph = t * P.freq * TAU + i * P.stag; return { dx: g * 0.25 * (i % 2 ? 1 : -1) + Math.sin(ph) * P.amp * IDLE_W * e, dy: g * 0.18, op: 0.08 + 0.92 * eo * (0.92 + 0.08 * Math.sin(ph)) }; },
        // Gentle fade + tiny rise; the calmest, most legible reveal (Classical).
        fadeUp: (e, t, i, s, P) => { const eo = easeOutCubic(e); return { dy: -(1 - eo) * 0.22, op: eo }; },
        // Slow lateral drift in from the side, very calm (Lo-Fi).
        driftIn: (e, t, i, s, P) => { const eo = easeOutExpo(e), g = 1 - eo, ph = t * P.freq * TAU - i * P.stag; return { dx: g * 0.7 + Math.sin(ph) * P.amp * 0.6 * IDLE_W * e, op: 0.2 + 0.8 * eo }; },
        // Rise from below + fade, with a faint swell idle (Gospel).
        riseFade: (e, t, i, s, P) => { const eo = easeOutCubic(e), g = 1 - eo, ph = t * P.freq * TAU - i * P.stag; return { dy: -g * 0.5 + Math.sin(ph) * P.amp * 0.5 * IDLE_W * e, op: eo, sy: 1 + 0.05 * Math.sin(ph) * IDLE_W * e }; },
        // Heavy drop from high with a real bounce + squash landing (Trap).
        dropHeavy: (e, t, i, s, P) => { const eo = easeOutBounce(e), land = e > 0.85 ? Math.sin(((e - 0.85) / 0.15) * Math.PI) : 0; return { dy: (1 - eo) * 1.3, sy: 1 - land * 0.22, sx: 1 + land * 0.15 }; },
        // Sharp scale pop from 0 with overshoot (Grime).
        popScale: (e, t, i, s, P) => { const sc = easeOutBack(e); return { sx: sc, sy: sc, op: Math.min(1, e * 3) }; },
        // Springy damped wobble settle (Ska).
        wobbleIn: (e, t, i, s, P) => { const eo = easeOutElastic(e), g = 1 - eo; return { dx: g * 0.4 * (i % 2 ? 1 : -1), rot: g * 0.3, op: Math.min(1, e * 3) }; },
        // Cinematic zoom-from-large + blur focusing to settle (Orchestral Film).
        zoomBlur: (e, t, i, s, P) => { const eo = easeOutExpo(e), g = 1 - eo; return { sx: 1 + g * 1.2, sy: 1 + g * 1.2, dz: g * 0.5, op: 0.1 + 0.9 * eo }; },
        // Slide in from alternating sides (House).
        slideIn: (e, t, i, s, P) => { const eo = easeOutCubic(e), g = 1 - eo; return { dx: g * 0.8 * (i % 2 ? 1 : -1), op: Math.min(1, e * 4) }; },
        // Vertical unfold: scaleY 0→1 with an overshoot, a slight widen during (Opera).
        unfoldV: (e, t, i, s, P) => { const eo = easeOutBack(e); return { sy: Math.max(0.02, eo), sx: 1 + (1 - eo) * 0.1, op: Math.min(1, e * 4) }; },
      };

      // 50 canonical genres -> { prim, amp, freq, stag }. Same names/labels as
      // genre-map.js (Genre.txt). amp = em-fraction, freq = Hz-ish, stag = per-
      // letter phase (rad). Genres sharing a primitive differ via these params.
      const GENRE_ANIM = {
        "Pop": { prim: "bounce", amp: 0.12, freq: 1.1, stag: 0.5 },
        "Hip-Hop / Rap": { prim: "punch", amp: 0.06, freq: 1.3, stag: 0.6 },
        "Rock": { prim: "kinetic", amp: 0.10, freq: 1.2, stag: 0.45 },
        "Electronic / EDM": { prim: "glitch", amp: 0.10, freq: 2.0, stag: 0.0 },
        "R&B": { prim: "wave", amp: 0.07, freq: 0.7, stag: 0.55 },
        "Country": { prim: "staticReveal", amp: 0.05, freq: 0.5, stag: 0.4 },
        "Jazz": { prim: "swing", amp: 0.05, freq: 0.8, stag: 0.5 },
        "Classical": { prim: "fadeUp", amp: 0.045, freq: 0.4, stag: 0.5 },
        "Reggae": { prim: "swing", amp: 0.06, freq: 0.6, stag: 0.5 },
        "Metal": { prim: "jitter", amp: 0.10, freq: 2.4, stag: 0.0 },
        "Lo-Fi": { prim: "driftIn", amp: 0.05, freq: 0.35, stag: 0.6 },
        "Synthwave": { prim: "neonFlicker", amp: 0.05, freq: 1.0, stag: 0.5 },
        "Indie / Folk": { prim: "staticReveal", amp: 0.05, freq: 0.55, stag: 0.45 },
        "Latin / Reggaeton": { prim: "kinetic", amp: 0.09, freq: 1.4, stag: 0.5 },
        "K-Pop / J-Pop": { prim: "flipIn", amp: 0.05, freq: 1.2, stag: 0.4 },
        "Punk": { prim: "jitter", amp: 0.09, freq: 2.6, stag: 0.0 },
        "Blues": { prim: "wave", amp: 0.06, freq: 0.6, stag: 0.6 },
        "Soul / Funk": { prim: "kinetic", amp: 0.09, freq: 1.1, stag: 0.5 },
        "Ambient": { prim: "softBlur", amp: 0.055, freq: 0.25, stag: 0.7 },
        "Disco": { prim: "spinIn", amp: 0.05, freq: 1.2, stag: 0.45 },
        "Gospel": { prim: "riseFade", amp: 0.08, freq: 0.6, stag: 0.55 },
        "Ska": { prim: "wobbleIn", amp: 0.05, freq: 1.5, stag: 0.5 },
        "Industrial": { prim: "mechanical", amp: 0.08, freq: 1.2, stag: 0.5 },
        "Hyperpop": { prim: "scatterGather", amp: 0.06, freq: 2.0, stag: 0.0 },
        "Orchestral Film": { prim: "zoomBlur", amp: 0.08, freq: 0.35, stag: 0.6 },
        "Trap": { prim: "dropHeavy", amp: 0.07, freq: 1.0, stag: 0.6 },
        "Dubstep": { prim: "elastic", amp: 0.07, freq: 0.9, stag: 0.55 },
        "Phonk": { prim: "glitch", amp: 0.09, freq: 1.7, stag: 0.0 },
        "Shoegaze": { prim: "blurDrift", amp: 0.07, freq: 0.4, stag: 0.6 },
        "Vaporwave": { prim: "neonFlicker", amp: 0.05, freq: 0.6, stag: 0.6 },
        "Afrobeats": { prim: "bounce", amp: 0.10, freq: 1.3, stag: 0.5 },
        "Grime": { prim: "popScale", amp: 0.07, freq: 1.6, stag: 0.55 },
        "Techno": { prim: "mechanical", amp: 0.07, freq: 1.8, stag: 0.4 },
        "House": { prim: "slideIn", amp: 0.06, freq: 1.0, stag: 0.5 },
        "Bluegrass": { prim: "mechanical", amp: 0.06, freq: 2.2, stag: 0.35 },
        "Chiptune / 8-Bit": { prim: "mechanical", amp: 0.08, freq: 2.6, stag: 0.3 },
        "Post-Rock": { prim: "wave", amp: 0.08, freq: 0.3, stag: 0.65 },
        "Acid Jazz": { prim: "swing", amp: 0.06, freq: 0.9, stag: 0.5 },
        "Grunge": { prim: "jitter", amp: 0.08, freq: 2.0, stag: 0.0 },
        "Mathematical Rock": { prim: "mechanical", amp: 0.07, freq: 1.5, stag: 0.6 },
        "Emo": { prim: "blurDrift", amp: 0.05, freq: 0.45, stag: 0.55 },
        "Flamenco": { prim: "punch", amp: 0.06, freq: 1.8, stag: 0.5 },
        "Bossa Nova": { prim: "swing", amp: 0.045, freq: 0.7, stag: 0.55 },
        "Dark Ambient": { prim: "blurDrift", amp: 0.06, freq: 0.2, stag: 0.7 },
        "Future Bass": { prim: "scatterGather", amp: 0.06, freq: 1.2, stag: 0.45 },
        "New Wave": { prim: "flipIn", amp: 0.05, freq: 1.0, stag: 0.5 },
        "Celtic": { prim: "blurDrift", amp: 0.055, freq: 0.5, stag: 0.55 },
        "Cyberpunk": { prim: "neonFlicker", amp: 0.05, freq: 1.6, stag: 0.0 },
        "Opera": { prim: "unfoldV", amp: 0.07, freq: 0.4, stag: 0.6 },
        "Ska Punk": { prim: "spinIn", amp: 0.06, freq: 1.4, stag: 0.4 },
        // Neutral default until a genre resolves (or when none is found).
        "Default": { prim: "staticReveal", amp: 0.04, freq: 0.5, stag: 0.45 },
      };

      // Active genre state. Set from the genre-update IPC; reset to Default on a
      // track change. gGenreAnim is the resolved { prim, amp, freq, stag } record.
      let gGenre = null;
      let gGenreAnim = GENRE_ANIM.Default;
      function setGenreAnim(name) {
        gGenre = name || null;
        gGenreAnim = (name && GENRE_ANIM[name]) || GENRE_ANIM.Default;
      }

      /* ── §genre-ai — on-device tags→genre (DeBERTa-v3-XSmall), Settings-gated ──
       * When "On-device AI" is ON, a Web Worker zero-shot-classifies the track's
       * iTunes/Last.fm GENRE TAGS over the 50 canonical genres; resolveFinalGenre()
       * COMBINES that with the alias-matched tag genre (a confidence-weighted prior)
       * for a higher-accuracy pick. Feeding the short tag strings (not the lyrics)
       * keeps the NLI premise tiny, so each of the 50 passes is fast. This is also
       * exactly the original genre-map DeBERTa seam: resolve subgenre tags the
       * deterministic alias map missed. OFF = alias tags only, as before. */
      let aiEnabled = false;
      let aiWorker = null;
      let aiTagResult = null; // { genre, matchSource } from genre-update, current track
      let aiTags = null;      // raw provider tags for the current track (AI input)
      let aiScores = null;    // { genre: prob } from the worker
      let aiScoresKey = "";   // track key the scores belong to (guards stale results)
      // Prior added to the tag genre's AI score, by how confident the tag match was.
      // The "fallback" default (Pop) carries no signal, so it gets zero weight.
      const AI_TAG_BONUS = { alias: 0.5, deberta: 0.5, fallback: 0 };
      const aiLabels = () => Object.keys(GENRE_ANIM).filter((g) => g !== "Default");

      function ensureAiWorker() {
        if (aiWorker) return aiWorker;
        try {
          aiWorker = new Worker("/ai-genre-worker.js", { type: "module" });
          aiWorker.onmessage = (ev) => {
            const m = ev.data || {};
            if (m.type === "status") { console.log("[Genre AI] model " + m.state); return; }
            if (m.type !== "result") return;
            if (m.key !== curTrackKey) return; // a newer track is playing -> drop
            if (m.error || !m.scores) { console.warn("[Genre AI] classify failed: " + (m.error || "no scores")); return; }
            aiScores = m.scores; aiScoresKey = m.key;
            const top = Object.entries(m.scores).sort((a, b) => b[1] - a[1]).slice(0, 3)
              .map(([g, s]) => `${g} ${Math.round(s * 100)}%`).join(", ");
            console.log("[Genre AI] tags -> " + top);
            resolveFinalGenre();
          };
          aiWorker.onerror = (e) => console.warn("[Genre AI] worker error: " + ((e && e.message) || e));
        } catch (e) {
          console.warn("[Genre AI] worker unavailable: " + ((e && e.message) || e));
          aiWorker = null;
        }
        return aiWorker;
      }

      // Send the current track's genre tags to the worker (once per track). Short
      // input (a few tag words) -> fast 50-label zero-shot. No tags -> nothing to
      // refine, so the alias tag genre stands on its own.
      function classifyGenreWithAI(tags) {
        if (!aiEnabled || gGenreOverride) return;
        if (!Array.isArray(tags) || !tags.length) return;
        if (aiScores && aiScoresKey === curTrackKey) return; // already classified this track
        const w = ensureAiWorker();
        if (!w) return;
        w.postMessage({ type: "classify", key: curTrackKey, text: tags.join(", "), labels: aiLabels() });
      }

      // Decide the final genre from whatever signals exist, then drive the animation.
      function resolveFinalGenre() {
        if (gGenreOverride) return; // dev pin wins
        const tagGenre = aiTagResult && aiTagResult.genre;
        // AI off, scores not in yet, or scores belong to a previous track -> tags only.
        if (!aiEnabled || !aiScores || aiScoresKey !== curTrackKey) {
          if (tagGenre) setGenreAnim(tagGenre);
          return;
        }
        const bonus = aiTagResult ? (AI_TAG_BONUS[aiTagResult.matchSource] ?? 0.3) : 0;
        let best = null, bestScore = -Infinity;
        for (const g in aiScores) {
          const score = aiScores[g] + (g === tagGenre ? bonus : 0);
          if (score > bestScore) { bestScore = score; best = g; }
        }
        if (best) {
          setGenreAnim(best);
          console.log(`[Genre] combined -> ${best} (tag:${tagGenre || "—"}/${(aiTagResult && aiTagResult.matchSource) || "—"})`);
        } else if (tagGenre) {
          setGenreAnim(tagGenre);
        }
      }

      // Settings toggle. ON: ensure the worker + (re)classify the current track's
      // tags. OFF: drop AI influence and re-resolve to the alias tag genre.
      function setAiEnabled(on) {
        aiEnabled = !!on;
        try { localStorage.setItem("cotolyrics.aiGenre", aiEnabled ? "1" : "0"); } catch (_) {}
        if (aiToggle) aiToggle.checked = aiEnabled;
        if (aiEnabled) { ensureAiWorker(); classifyGenreWithAI(aiTags); }
        resolveFinalGenre();
      }
      // Apply the active genre primitive to ONE glyph `c` (front + shadow), layered
      // on the glyph's static baseX. `e` (0..1) is the letter's APPEARING progress —
      // the primitive bakes the entrance + idle blend off it. Returns an opacity
      // multiplier (blur/glow/flicker styles). No-op when animations are globally off.
      function applyGlyphAnim(c, i, n, tSec, e) {
        if (!ANIMATIONS_ACTIVE) return 1;
        const P = gGenreAnim;
        const fn = GLYPH_PRIMS[P.prim] || GLYPH_PRIMS.staticReveal;
        const o = fn(e, tSec, i, c.seed || (c.seed = (i + 1) * 911), P);
        const em = c.em || 1;
        const dx = (o.dx || 0) * em, dy = (o.dy || 0) * em, dz = (o.dz || 0) * em;
        const rot = o.rot || 0, rotX = o.rotX || 0;
        const sx = o.sx == null ? 1 : o.sx, sy = o.sy == null ? 1 : o.sy;
        c.front.position.set(c.baseX + dx, dy, FRONT_Z + dz);
        c.front.rotation.set(rotX, 0, rot); c.front.scale.set(sx, sy, 1);
        c.shadow.position.set(c.baseX + dx + SHADOW_DX, dy + SHADOW_DY, SHADOW_DZ + dz);
        c.shadow.rotation.set(rotX, 0, rot); c.shadow.scale.set(sx, sy, 1);
        return o.op == null ? 1 : o.op;
      }

      /* ── § DISAPPEAR (EXIT) ANIMATION ──────────────────────────────────────
       * The mirror of the appearing engine: when a lyric line FINISHES, its letters
       * play one of these exit primitives, driven by exit progress `x` (0 = settled,
       * 1 = fully gone). `op` must reach 0 by x=1 so the glyph vanishes before
       * disposal. Same return shape as the appear primitives. */
      const EXIT_PRIMS = {
        fadeOut: (x, t, i, s, P) => ({ dy: -x * 0.15, op: 1 - x }),
        blurOut: (x, t, i, s, P) => { const k = x * x; return { dx: k * 0.3 * (i % 2 ? 1 : -1), dy: k * 0.2, op: Math.max(0, 1 - x * 1.1) }; },
        riseOut: (x, t, i, s, P) => ({ dy: x * x * 0.8, op: 1 - x }),
        fallOut: (x, t, i, s, P) => ({ dy: -x * x * 1.0, op: 1 - x }),
        scatterOut: (x, t, i, s, P) => { const ang = rnd(s + i * 13) * TAU, d = x * x * 1.4; return { dx: Math.cos(ang) * d, dy: Math.sin(ang) * d, rot: x * (rnd(s + i * 7) - 0.5) * 3, op: 1 - x }; },
        spinOut: (x, t, i, s, P) => { const sc = Math.max(0.02, 1 - x); return { rot: x * x * Math.PI * 3 * (i % 2 ? 1 : -1), sx: sc, sy: sc, op: 1 - x }; },
        flipOut: (x, t, i, s, P) => ({ rotX: x * (Math.PI * 0.5) * (i % 2 ? 1 : -1), dy: x * 0.1, op: 1 - x }),
        shrinkOut: (x, t, i, s, P) => { const sc = Math.max(0.02, 1 - x); return { sx: sc, sy: sc, op: 1 - x }; },
        glitchOut: (x, t, i, s, P) => { const bk = Math.floor(x * 14); const j = (rnd(s + i * 7 + bk * 5) - 0.5) * x * 0.8; const fl = rnd(s + bk * 3 + i) < 0.4 ? 0.2 : 1; return { dx: j, op: (1 - x) * fl }; },
        dissolveOut: (x, t, i, s, P) => { const jx = (rnd(s + i * 5 + Math.floor(t * 12)) - 0.5) * x * 0.3; return { dx: jx, dy: x * 0.1, op: Math.max(0, 1 - x * 1.2) }; },
        slideOut: (x, t, i, s, P) => { const k = x * x; return { dx: k * 0.9 * (i % 2 ? 1 : -1), op: 1 - x }; },
        neonOut: (x, t, i, s, P) => { let op; if (x < 0.6) { const fb = Math.floor(x * 12); op = rnd(s + i * 5 + fb * 11) < 0.5 ? 0.15 : 1; } else { op = Math.max(0, 1 - (x - 0.6) / 0.4); } return { op, sx: 1 + (x < 0.3 ? Math.sin((x / 0.3) * Math.PI) * 0.1 : 0) }; },
      };
      // Each appear primitive's matching exit (so every genre disappears in-style
      // with no per-genre wiring). A GENRE_ANIM entry may override with an `exit` key.
      const EXIT_BY_PRIM = {
        bounce: "fallOut", punch: "shrinkOut", kinetic: "slideOut", glitch: "glitchOut",
        blurDrift: "blurOut", glowPulse: "shrinkOut", swing: "riseOut", wave: "riseOut",
        jitter: "glitchOut", mechanical: "dissolveOut", elastic: "shrinkOut", staticReveal: "fadeOut",
        scatterGather: "scatterOut", flipIn: "flipOut", spinIn: "spinOut", neonFlicker: "neonOut",
        softBlur: "blurOut", fadeUp: "fadeOut", driftIn: "slideOut", riseFade: "riseOut",
        dropHeavy: "fallOut", popScale: "shrinkOut", wobbleIn: "slideOut", zoomBlur: "shrinkOut",
        slideIn: "slideOut", unfoldV: "shrinkOut",
      };
      // Resolve the exit primitive fn for the CURRENT genre (snapshotted onto a line
      // when it retires, so it disappears in its own genre's style).
      function exitPrimFor() {
        const P = gGenreAnim;
        return (P.exit && EXIT_PRIMS[P.exit]) || EXIT_PRIMS[EXIT_BY_PRIM[P.prim]] || EXIT_PRIMS.fadeOut;
      }
      // Apply an exit primitive to ONE glyph; returns the opacity multiplier (→0).
      function applyGlyphExit(c, i, x, tSec, fn, P) {
        const o = fn(x, tSec, i, c.seed || (c.seed = (i + 1) * 911), P);
        const em = c.em || 1;
        const dx = (o.dx || 0) * em, dy = (o.dy || 0) * em, dz = (o.dz || 0) * em;

        const mat = pc.material;
        mat.opacity += ((show ? 0.9 : 0) - mat.opacity) * (1 - Math.exp(-4 * dt));
        if (mat.opacity < 0.01) { pc.visible = false; return; }
        pc.visible = true;
        mat.color = inkColorAt(bgLevel);
        // Phase 1: a stationary point sphere (clean instrumental placeholder).
        // Phase 2: energy-reactive pulse + slow rotation.
        if (!ANIMATIONS_ACTIVE) return;
        const arr = pc.geometry.attributes.position.array;
        const base = pc.userData.base;
        const pulse = 1 + energy * 0.9 + 0.05 * Math.sin(tSec * 2);
        for (let i = 0; i < base.length; i += 3) {
          const n = 1 + 0.12 * Math.sin(tSec * 3 + i);
          arr[i] = base[i] * pulse * n;
          arr[i + 1] = base[i + 1] * pulse * n;
          arr[i + 2] = base[i + 2] * pulse;
        }
        pc.geometry.attributes.position.needsUpdate = true;
        pc.rotation.y += dt * (0.05 + energy * 0.5);
        pc.rotation.x += dt * 0.02;
      }

      /* ── §14  PLAYBACK CLOCK ─────────────────────────────────────────── */
      let playing = false, anchorPosSec = 0, anchorWallMs = performance.now(), rateMul = 1, curDurationSec = 0;
      let lastSmtcStatus = "";              // last SMTC status — detects play/pause flips
      const RESYNC_THRESHOLD_SEC = 0.35;    // only HARD re-anchor on drift beyond this (a real seek)
      function posSec() {
        if (!playing) return Math.max(0, anchorPosSec);
        let p = anchorPosSec + ((performance.now() - anchorWallMs) / 1000) * rateMul;
        if (curDurationSec > 0) p = Math.min(p, curDurationSec + 0.5);
        return Math.max(0, p);
      }

      /* ── APPLE MUSIC MODE — DOM scrolling karaoke lyrics ───────────────────
       * Opt-in (Settings). When ON it OVERRIDES all canvas animation: tick() skips
       * the Three.js lyric/camera/render path and this DOM overlay renders a
       * vertical line list that springs so the active line stays centered, with the
       * active line's words filling charcoal left→right (karaoke) as the clock
       * reaches them. Clean white theme. Reuses phrases[] + phraseIndexAt/wordIndexAt. */
      let appleMode = false;
      let amLines = [];     // [{ el, words:[{ el, time, end }] }]
      let amActivePi = -1;  // last active phrase index (class-thrash guard)
      let amScrollY = 0;    // current eased translateY (px)
      let amSnap = true;    // snap (no ease) on the first frame after a (re)build
      let amLineH = 56;     // cached representative line height (avoids per-frame layout reads)
      const AM_SCROLL_K = 5.5; // spring rate (1/s) — gentle, no overshoot
      // Depth-of-field blur: lines blur as they enter from the bottom, sharpen at
      // the center, blur again toward the top (real Apple Music look). A line's
      // signed distance from the viewport center is amScrollY + L.mid; blur ramps
      // outside a crisp dead zone, capped. Tuned vs. viewport so it scales.
      const AM_BLUR_MAX = 6;       // px hard cap on the furthest lines
      const AM_BLUR_DEAD_FR = 0.55; // crisp half-window around center, in line-heights
      // Reading glow: the line at center softly blooms, fading out within ~1.4 line
      // heights, so the lyric you're on glows brightest and neighbours stay calm.
      const AM_GLOW_MAX = 0.5;       // peak halo alpha at dead-center
      const AM_GLOW_RADIUS = 28;     // px halo blur radius at center
      const AM_GLOW_RANGE_FR = 1.4;  // how far the glow reaches, in line-heights
      const AM_GLOW_RGB = "150,170,255"; // soft cool-white bloom (visible on the white theme)

      function buildAppleLyrics() {
        if (!amInner) return;
        amInner.textContent = "";
        amLines = []; amActivePi = -1; amSnap = true; amScrollY = 0;
        amInner.style.transform = "translate3d(0,0,0)";
        const oldPh = document.getElementById("am-placeholder"); // viewport-centered, sibling of amInner
        if (oldPh) oldPh.remove();
        if (!phrases.length) { // no synced lyrics -> centered title + ♪
          const ph = document.createElement("div");
          ph.id = "am-placeholder";
          const ttl = document.createElement("div"); ttl.className = "am-ph-title"; ttl.textContent = curTrack.title || "—";
          const note = document.createElement("div"); note.className = "am-ph-note"; note.textContent = "♪";
          ph.appendChild(ttl); ph.appendChild(note); amLyrics.appendChild(ph);
          return;
        }
        for (let pi = 0; pi < phrases.length; pi++) {
          const phrase = phrases[pi];
          const line = document.createElement("div");
          line.className = "am-line";
          const ws = phrase.words || [];
          const wordEls = [];
          for (let wi = 0; wi < ws.length; wi++) {
            const w = ws[wi];
            const span = document.createElement("span");
            span.className = "am-word";
            span.textContent = w.text;
            span.style.setProperty("--fill", "0%");
            const end = wi + 1 < ws.length ? ws[wi + 1].time : phrase.endTime;
            wordEls.push({ el: span, time: w.time, end: Number.isFinite(end) && end > w.time ? end : w.time + 0.6 });
            line.appendChild(span);
            if (wi < ws.length - 1) line.appendChild(document.createTextNode(" "));
          }
          if (!ws.length) line.textContent = phrase.fullText || " ";
          amInner.appendChild(line);
          amLines.push({ el: line, words: wordEls, mid: 0 });
        }
        recomputeAmMids();
      }

      // Cache each line's center (offsetTop + height/2) so the per-frame blur pass
      // never reads layout. Re-run after web fonts settle and on resize, since both
      // reflow the list and shift every line's center.
      function recomputeAmMids() {
        for (const L of amLines) L.mid = L.el.offsetTop + L.el.offsetHeight / 2;
        if (amLines.length) amLineH = amLines[0].el.offsetHeight || amLineH; // cache once; lines share a size
      }

      function updateAppleLyrics(t, dt) {
        if (!amLines.length) return; // placeholder / no lyrics
        let pi = phraseIndexAt(t);
        if (pi < 0) pi = amActivePi >= 0 ? amActivePi : 0; // hold during gaps / lead-in
        if (pi !== amActivePi) {
          // Rewrite line classes + lock fills (robust to forward/back seeks).
          for (let i = 0; i < amLines.length; i++) {
            const L = amLines[i], isActive = i === pi, isPast = i < pi;
            L.el.className = isActive ? "am-line active" : isPast ? "am-line past" : "am-line";
            if (!isActive) {
              const f = isPast ? "100%" : "0%";
              for (const w of L.words) { w.el.style.setProperty("--fill", f); if (w.el.classList.contains("cur")) w.el.classList.remove("cur"); }
            }
          }
          amActivePi = pi;
        }
        // Per-word karaoke fill on the active line.
        const active = amLines[pi];
        const wiCur = wordIndexAt(phrases[pi], t);
        for (let wi = 0; wi < active.words.length; wi++) {
          const w = active.words[wi];
          let fill, cur = false;
          if (wi < wiCur) fill = 100;
          else if (wi === wiCur) { const d = w.end - w.time; fill = d > 0 ? Math.max(0, Math.min(1, (t - w.time) / d)) * 100 : 100; cur = true; }
          else fill = 0;
          w.el.style.setProperty("--fill", fill.toFixed(1) + "%");
          if (cur !== w.el.classList.contains("cur")) w.el.classList.toggle("cur", cur);
        }
        // Spring-scroll so the active line's center sits at the viewport center.
        // Frame-rate-independent exponential ease (no overshoot); translate3d keeps
        // the whole list on its own GPU layer for jank-free scrolling.
        const target = -(active.mid || (active.el.offsetTop + active.el.offsetHeight / 2));
        if (amSnap) { amScrollY = target; amSnap = false; }
        else amScrollY += (target - amScrollY) * (1 - Math.exp(-AM_SCROLL_K * dt));
        amInner.style.transform = `translate3d(0, ${amScrollY.toFixed(2)}px, 0)`;
        // Per-line depth-of-field + reading glow, both keyed off each line's signed
        // distance from the viewport center (= amScrollY + L.mid). Uses the cached
        // line height + mids, so NO layout is read here (no per-frame reflow → smooth).
        const dead = amLineH * AM_BLUR_DEAD_FR;
        const falloff = Math.max(1, window.innerHeight * 0.18);
        const glowRange = Math.max(1, amLineH * AM_GLOW_RANGE_FR);
        for (let i = 0; i < amLines.length; i++) {
          const L = amLines[i];
          const dist = Math.abs(amScrollY + L.mid);
          // Blur: crisp within the dead zone, ramping out to AM_BLUR_MAX.
          const px = Math.min(AM_BLUR_MAX, Math.max(0, (dist - dead) / falloff) * AM_BLUR_MAX);
          const blur = px > 0.05 ? `blur(${px.toFixed(2)}px)` : "";
          if (L._blur !== blur) { L.el.style.filter = blur; L._blur = blur; }
          // Glow: peaks at center, eased (prox²) so only the line being read blooms.
          const prox = Math.max(0, 1 - dist / glowRange);
          const a = prox * prox * AM_GLOW_MAX;
          const glow = a > 0.02
            ? `0 0 ${(AM_GLOW_RADIUS * (0.55 + 0.45 * prox)).toFixed(0)}px rgba(${AM_GLOW_RGB},${a.toFixed(2)})`
            : "";
          if (L._glow !== glow) { L.el.style.textShadow = glow; L._glow = glow; }
        }
      }

      // Toggle the whole mode. ON overrides + hides the canvas; OFF restores it.
      function setAppleMode(on) {
        appleMode = !!on;
        try { localStorage.setItem("cotolyrics.appleMode", appleMode ? "1" : "0"); } catch (_) {}
        if (appleToggle) appleToggle.checked = appleMode;
        if (appleMode) {
          clearCanvasLyrics();
          if (exitingLines && exitingLines.length) { for (const l of exitingLines) disposeLineMeshes(l); exitingLines.length = 0; }
          if (threeCanvas) threeCanvas.style.display = "none";
          if (amLyrics) amLyrics.classList.remove("hidden");
          buildAppleLyrics();
        } else {
          if (amLyrics) amLyrics.classList.add("hidden");
          if (threeCanvas) threeCanvas.style.display = "";
          // Force the canvas pipeline to rebuild the current line on the next frame.
          currentPhraseIndex = -1; activePhraseUid = null; lastPhraseKey = "";
        }
      }
      // Rebuild the Apple list whenever phrases change (no-op unless mode is on).
      function syncAppleToPhrases() { if (appleMode) buildAppleLyrics(); }
      // Web-font load and window resize both reflow the line list; refresh the
      // cached centers (used by both the spring-scroll and the depth-of-field blur).
      try { document.fonts.ready.then(() => { if (appleMode) recomputeAmMids(); }); } catch (_) {}
      window.addEventListener("resize", () => { if (appleMode) recomputeAmMids(); });

      /* ── §15  ANIMATION LOOP (delta-time) ────────────────────────────── */
      let lastTickMs = performance.now();
      const camLook = { x: 0, y: 0, z: 0 }; // smoothed camera look-at target
      let dInvert = false, prevOnsetSec = -1; // Profile D invert state
      function tick() {
        requestAnimationFrame(tick);
        const nowMs = performance.now();
        let dt = (nowMs - lastTickMs) / 1000;
        lastTickMs = nowMs;
        if (dt > 0.1) dt = 0.1; // clamp after tab-stalls
        const tSec = nowMs / 1000;

        // Energy + mood + onset.
        energy = readEnergy();
        energyAvg = energyAvg * 0.92 + energy * 0.08;
        smoothEnergy = smoothEnergy + (energy - smoothEnergy) * (1 - Math.exp(-1.5 * dt));
        if (energy - energyAvg > 0.12) shakeEnv = 1; else shakeEnv = Math.max(0, shakeEnv - dt * 3.2);
        readDsp(tSec); // §6 spectrum/onset/BPM features
        updateLiveProfile(tSec); // follow the live tempo tier (until authoritatively locked)
        // Ease the rendered CAMERA params toward the (now stable) profile so a
        // tier change glides the framing in instead of jumping.
        {
          const tgt = PROFILE_CAMERA[renderProfile] || PROFILE_CAMERA.B;
          const kr = 1 - Math.exp(-PROFILE_TWEEN_K * dt);
          camK.zoomAmp += (tgt.zoomAmp - camK.zoomAmp) * kr;
          camK.zoomRate += (tgt.zoomRate - camK.zoomRate) * kr;
          camK.moveAmp += (tgt.moveAmp - camK.moveAmp) * kr;
          camK.chase += (tgt.chase - camK.chase) * kr;
        }
        if (DSP_DEBUG && nowMs - dspLogLastMs > 1000) { // ~1 Hz pipeline trace
          dspLogLastMs = nowMs;
          const est = tempoEstimator.estimate(tSec);
          console.log(`[DSP] bpm=${dspBpm} raw=${dspBpmRaw} rate=${est.onsetRate.toFixed(1)}/s onsets4s=${onsetTimes.length} energy=${energy.toFixed(3)} avg=${energyAvg.toFixed(3)} tier=${renderProfile} loop=${analyser ? "on" : "OFF"} override=${trackBpmOverride || "-"}`);
        }
        try { maybeLearnBpm(tSec); } catch (e) { /* §3 — never let the learn hook halt the frame loop */ }
        latestMotion = moodToMotion(sampleMood({ energy }, 0));

        // Lyric position + word firing.
        const p = posSec();
        // APPLE MUSIC MODE overrides everything below: render the DOM karaoke list
        // and skip the entire Three.js lyric/camera/render path for this frame.
        if (appleMode) {
          if (curDurationSec > 0) progressFill.style.width = Math.min(100, (p / curDurationSec) * 100).toFixed(2) + "%";
          updateAppleLyrics(p, dt);
          return;
        }
        syncLyrics(p);
        if (curDurationSec > 0) progressFill.style.width = Math.min(100, (p / curDurationSec) * 100).toFixed(2) + "%";

        // Background is LOCKED solid white at all times (no inversion, no dim).
        applyBg();

        // Per-profile camera (Phase 1 baseline = locked dead-center).
        updateCamera(dt, tSec, nowMs);

        // Word kinetics (appear entrance + idle + opacity) for the active phrase.
        if (activeLine) {
          updateLineWords(activeLine, dt, tSec, false);
          // §3 — angle the whole phrase dynamically on its X/Y axes. Combined with
          // the per-profile perspective camera + the z-separated shadow layer, the
          // tilt produces dramatic kinetic parallax. Bounded so text stays legible.
          const ang = 0.09 + 0.13 * smoothEnergy; // legible 3D tilt (camera adds the drama)
          activeLine.group.rotation.y = Math.sin(tSec * 0.5) * ang;
          activeLine.group.rotation.x = Math.cos(tSec * 0.4) * ang * 0.45;
          // Sentence-end-with-gap: once the line's time is up and no successor has
          // replaced it (instrumental break), retire it so it DISAPPEARS at its end
          // instead of lingering on screen through the silence.
          if (ANIMATIONS_ACTIVE && activeLine.phrase && activeLine.phrase.endTime > 0 && p >= activeLine.phrase.endTime) {
            retireActiveLineAnimated();
          }
        }

        // Advance + dispose any lines playing their DISAPPEAR animation out.
        if (exitingLines.length) {
          const nowS = nowMs / 1000;
          for (let k = exitingLines.length - 1; k >= 0; k--) {
            const line = exitingLines[k];
            const done = updateLineExit(line, nowS);
            if (done) { disposeLineMeshes(line); exitingLines.splice(k, 1); }
          }
        }

        updatePointCloud(dt, tSec);
        renderer.render(scene, camera);
      }

      function updateLineWords(line, dt, tSec, exiting) {
        // Reveal alpha-ease is now a CONSTANT — the BPM tier no longer touches the
        // letters (it drives only the camera). Per-letter motion is the genre
        // engine's job (applyGlyphAnim below).
        const opacRate = 1 - Math.exp(-OPAC_K * dt);
        const nowS = performance.now() / 1000; // wall clock — matches the wd.born stamp
        for (const wd of line.words) {
          // ── REVEAL OPACITY (the sequence print). The ACTIVE word reveals its
          //    glyphs LEFT→RIGHT as a rapid typewriter cascade (CHAR_STAGGER apart
          //    from wd.born, each ramping over REVEAL_RAMP); every letter locks to
          //    full charcoal FRONT_ALPHA (0.85) as it lands. PAST words hold all
          //    glyphs at full 1.0 (the building sentence); FUTURE words ease to 0
          //    -> the vis gate flips mesh.visible=false (fully hidden, no ghosts).
          const tgt = exiting ? 0 : wd.opacityTarget;
          wd.opacity += (tgt - wd.opacity) * opacRate;
          const wordVis = wd.opacity > 0.004;
          const stagger = ANIMATIONS_ACTIVE && !exiting && wd.state === "active";
          const born = wd.born || nowS;
          const elapsed = stagger ? nowS - born : 0;
          const nChars = wd.chars.length;
          for (let ci = 0; ci < nChars; ci++) {
            const c = wd.chars[ci];
            let rev = 1; // per-glyph OPACITY reveal multiplier (fast, REVEAL_RAMP)
            if (stagger) {
              rev = (elapsed - ci * CHAR_STAGGER) / REVEAL_RAMP;
              rev = rev < 0 ? 0 : rev > 1 ? 1 : rev;
            }
            const cvis = stagger ? rev > 0.001 : wordVis;
            c.front.visible = cvis; c.shadow.visible = cvis;
            // APPEARING progress `e` (slower than the opacity ramp): each letter's
            // entrance plays over ENTRANCE_DUR from its own staggered birth, so the
            // glyph keeps moving into place after it's already visible, then settles.
            let e = 1;
            if (ANIMATIONS_ACTIVE) {
              e = (nowS - (born + ci * CHAR_STAGGER)) / ENTRANCE_DUR;
              e = e < 0 ? 0 : e > 1 ? 1 : e;
            }
            // GENRE per-letter animation: drives the entrance + subtle idle, returns
            // an opacity multiplier (blur/glow/flicker styles dim/flicker).
            const gOp = applyGlyphAnim(c, ci, nChars, tSec, e);
            c.front.material.opacity = wd.opacity * FRONT_ALPHA * rev * gOp;
            c.shadow.material.opacity = wd.opacity * SHADOW_ALPHA * rev * gOp;
          }

          // ── WORD-GROUP TRANSFORM. Glyphs are STATIC inside the group; only the
          //    parent group moves — the layout slide + spring "Pop" (kicked on
          //    activation). No per-character motion, so words never split.
          if (ANIMATIONS_ACTIVE) {
            applyKineticTransforms(wd, { dt }); // eases posCur/rotCur, springs scaleCur -> baseScale
          } else {
            wd.posCur.x = wd.target.x; wd.posCur.y = wd.target.y; wd.posCur.z = wd.target.z;
            wd.rotCur = 0; wd.scaleCur = wd.baseScale;
          }
          // The word group only slides to its layout target + the neutral spring
          // "Pop" on activation (applyKineticTransforms). No BPM shake/pulse/vibrate
          // here anymore — letter motion is the genre engine, camera is the BPM tier.
          wd.group.position.set(wd.posCur.x, wd.posCur.y, wd.posCur.z);
          wd.group.rotation.z = wd.rotCur;
          wd.group.scale.setScalar(Math.max(0.001, wd.scaleCur));
        }
        return false;
      }

      /* ── PHASE 2 KINETIC TRANSFORM HOOK ──────────────────────────────────
       * The entire Cotodama motion model for ONE word, per frame. Called from
       * updateLineWords ONLY when ANIMATIONS_ACTIVE is true; with the flag off
       * this is never invoked, so lyrics stay perfectly flat. Toggling the flag
       * re-activates: slide/spin entrance, the spring "Pop", and (via the weight
       * swap in onCotodamaNewWord) the 300/900 weight + opacity contrast. */
      function applyKineticTransforms(wd, state) {
        const { dt } = state;
        // Slide/spin toward the layout-profile target (incl. Z depth).
        const kp = 1 - Math.exp(-SLIDE_K * dt);
        wd.posCur.x += (wd.target.x - wd.posCur.x) * kp;
        wd.posCur.y += (wd.target.y - wd.posCur.y) * kp;
        wd.posCur.z += (wd.target.z - wd.posCur.z) * kp;
        wd.rotCur += (wd.rot - wd.rotCur) * (1 - Math.exp(-ROT_K * dt));
        // Rhythmic spring scaling ("The Pop"): Hooke's law + damping, semi-implicit Euler.
        const a = -SPRING_K * (wd.scaleCur - wd.baseScale) - SPRING_DAMP * wd.scaleVel;
        wd.scaleVel += a * dt;
        wd.scaleCur += wd.scaleVel * dt;
      }

      /* ── PER-TIER CAMERA (BPM = camera/zoom ONLY) ────────────────────────
       * A calm: gentle infinity-loop pan + faint breath · B pop: DOLLY-ZOOM into
       * the lyric, then repeat (the signature move) · D intense: snappy word-CHASE
       * + deeper dolly. NO shake/rattle in any tier — that motion is gone. Phase 1
       * (flag off) keeps the camera dead-centered. Eased camK ramps tier changes. */
      // World-space center of the CURRENTLY-REVEALING letter of the active word —
      // the letter-by-letter follow target. The active word reveals its glyphs
      // left→right (CHAR_STAGGER apart from wd.born), so flooring the elapsed time
      // gives the letter the camera should be on right now. Falls back to the word,
      // then the line center.
      function activeLetterCenter() {
        const l = activeLine;
        if (!l || l.activeIdx < 0 || !l.words[l.activeIdx]) return { x: 0, y: 0 };
        const wd = l.words[l.activeIdx];
        const bx = l.group.position.x + wd.posCur.x, by = l.group.position.y + wd.posCur.y;
        if (!wd.chars || !wd.chars.length) return { x: bx + wd.width * 0.5 * wd.scaleCur, y: by };
        const elapsed = performance.now() / 1000 - (wd.born || 0);
        let li = Math.floor(elapsed / CHAR_STAGGER);
        li = li < 0 ? 0 : li >= wd.chars.length ? wd.chars.length - 1 : li;
        const c = wd.chars[li];
        // baseX is the glyph's left edge in the word group; nudge to its rough center.
        return { x: bx + ((c.baseX || 0) + (l.emSize || 1) * 0.3) * wd.scaleCur, y: by };
      }
      // Stable x/y extent of the whole line from its layout targets (+ a glyph pad),
      // so the camera can cap its zoom + clamp its pan to keep every word on screen.
      function lineExtent(l) {
        let mnx = Infinity, mxx = -Infinity, mny = Infinity, mxy = -Infinity;
        for (const wd of l.words) {
          const x0 = wd.target.x, x1 = wd.target.x + wd.width * wd.baseScale, y = wd.target.y;
          if (x0 < mnx) mnx = x0; if (x1 > mxx) mxx = x1;
          if (y < mny) mny = y; if (y > mxy) mxy = y;
        }
        if (!isFinite(mnx)) return { mnx: -halfW, mxx: halfW, mny: -halfH, mxy: halfH };
        const pad = l.emSize || 1;
        return { mnx: mnx - pad * 0.25, mxx: mxx + pad * 0.25, mny: mny - pad * 0.85, mxy: mxy + pad * 0.45 };
      }
      // A smooth, NON-random ease-in→out→repeat factor (0→1→0) at `rate` rad/s.
      function zoomCycle(tSec, rate) { return 0.5 - 0.5 * Math.cos(tSec * rate); }
      const clamp = (v, lo, hi) => (v < lo ? lo : v > hi ? hi : v);

      /* ── PER-TIER CAMERA — LETTER-BY-LETTER FOLLOW + framed dolly-zoom ────
       * The camera pans to track the currently-sung LETTER (not the whole word, so
       * it no longer jumps word-to-word) and dollies in/out per tier. Both the pan
       * AND the zoom are clamped to the line's real extent, so a word can NEVER be
       * pushed off the edge. Camera looks straight ahead (the line's own tilt gives
       * the 3D depth), which guarantees the framed region == what's clamped. */
      function updateCamera(dt, tSec, nowMs) {
        if (!ANIMATIONS_ACTIVE) { camera.position.set(0, 0, CAM_Z); camera.lookAt(0, 0, 0); return; }
        if (!activeLine) {
          // Gap between lines — glide gently back to a centered, full frame.
          const k = 1 - Math.exp(-3 * dt);
          camLook.x += (0 - camLook.x) * k; camLook.y += (0 - camLook.y) * k;
          camera.position.x += (0 - camera.position.x) * k;
          camera.position.y += (0 - camera.position.y) * k;
          camera.position.z += (CAM_Z - camera.position.z) * k;
          camera.lookAt(camLook.x, camLook.y, 0);
          return;
        }
        const prof = activeLine.profile;

        // 1) LETTER FOLLOW — ease the look point toward the current letter (snappier
        //    for the intense tier so it keeps up; gentle for calm).
        const lc = activeLetterCenter();
        const kl = 1 - Math.exp(-(prof === "D" ? 7 : 4.5) * dt);
        camLook.x += (lc.x - camLook.x) * kl;
        camLook.y += (lc.y - camLook.y) * kl;

        // 2) DOLLY-ZOOM — in→out→repeat, but capped so the WHOLE line always fits.
        const ext = lineExtent(activeLine);
        const lineHalfW = Math.max(0.6, (ext.mxx - ext.mnx) / 2);
        const lineHalfH = Math.max(0.4, (ext.mxy - ext.mny) / 2);
        const fitCz = CAM_Z * Math.max(lineHalfW / halfW, lineHalfH / halfH) * 1.12;
        const dolly = camK.zoomAmp * zoomCycle(tSec, camK.zoomRate);
        let cz = CAM_Z - dolly;

          try {
            if (!incomingData) return;
            const bpm = parseInt(incomingData.bpm, 10); // strict numeric cast
            if (!Number.isFinite(bpm) || bpm <= 0) return;
            const currentBpmProfile = profileFromBpm(bpm, 0);
            console.log("[BPM Debug] Selected Profile: " + currentBpmProfile);
            // Apply only for the current track, and only if a tier hasn't locked
            // yet, so the profile resolves exactly ONCE per track.
            if (incomingData.title === curTrack.title && incomingData.artist === curTrack.artist && !lockedProfile) {
              trackBpmOverride = bpm;
              lockProfile(currentBpmProfile, bpm);
            }
          } catch (err) {
            console.error("[Frontend Init Crash Blocked]", err);
          }
        });
      }

      // §genre — canonical genre resolved in main from iTunes/Last.fm tags, pushed
      // once per track. Stored as the tag signal; resolveFinalGenre() applies it
      // (alone, or combined with the on-device AI when that toggle is ON).
      let gGenreOverride = false;
      if (window.cotodama && typeof window.cotodama.onGenreUpdate === "function") {
        window.cotodama.onGenreUpdate((p) => {
          try {
            if (!p || !p.genre || gGenreOverride) return;
            // Apply only for the still-current track.
            if (p.title === curTrack.title && p.artist === curTrack.artist) {
              aiTagResult = { genre: p.genre, matchSource: p.matchSource || "alias" };
              aiTags = Array.isArray(p.tags) ? p.tags : [];
              console.log(`[Genre] tag -> ${p.genre} [${p.source}/${p.matchSource || "?"}] tags=${aiTags.join(", ") || "—"}`);
              classifyGenreWithAI(aiTags); // refine with on-device AI (no-op unless the toggle is on)
              resolveFinalGenre();
            }
          } catch (err) { console.error("[Genre IPC error]", err); }
        });
      }

      // On-device AI toggle — restore the saved preference (kicks off the model
      // download + classify when ON), then wire changes. Placed here so the
      // genre state above is initialized before any restore call runs.
      if (aiToggle) {
        aiToggle.addEventListener("change", () => setAiEnabled(aiToggle.checked));
        try { if (localStorage.getItem("cotolyrics.aiGenre") === "1") setAiEnabled(true); } catch (_) {}
      }
      // DEV — preview the tag classifier without a live track: testAiGenre("trap, hip hop")
      // logs the worker's per-genre scores. Forces the AI path on for the call.
      window.testAiGenre = (tags) => {
        const w = ensureAiWorker(); if (!w) return;
        const text = Array.isArray(tags) ? tags.join(", ") : String(tags || "");
        w.postMessage({ type: "classify", key: curTrackKey, text, labels: aiLabels() });
      };

      // DEV OVERRIDE — force a genre for reviewing the 50 animations without a live
      // Last.fm hit: append ?genre=Metal (exact canonical name) to the URL, or call
      // setGenre("Metal") / setGenre(null) in the console. Override pins the genre
      // across track changes until cleared with setGenre(null).
      window.setGenre = (name) => {
        gGenreOverride = !!name;
        setGenreAnim(name);
        console.log(name ? `[Genre] dev override -> ${name} (${gGenreAnim.prim})` : "[Genre] dev override cleared");
        return name;
      };
      // DEV: preview ANY of the 16 primitives directly (independent of a matching
      // genre), e.g. setAnim("flipIn") / setAnim("scatterGather", { amp:0.08, freq:2 }).
      // setAnim(null) clears. Pins like setGenre until cleared.
      window.setAnim = (prim, opts) => {
        if (!prim) { gGenreOverride = false; setGenreAnim(null); console.log("[Genre] dev anim cleared"); return null; }
        if (!GLYPH_PRIMS[prim]) { console.warn(`[Genre] unknown primitive "${prim}". Options: ${Object.keys(GLYPH_PRIMS).join(", ")}`); return null; }
        gGenreOverride = true;
        gGenre = `dev:${prim}`;
        gGenreAnim = Object.assign({ prim, amp: 0.06, freq: 1.2, stag: 0.5 }, opts || {});
        console.log(`[Genre] dev anim -> ${prim}`, gGenreAnim);
        return prim;
      };
      try {
        const qp = new URLSearchParams(location.search).get("genre");
        if (qp) window.setGenre(qp);
      } catch (_) {}
    </script>
  </body>
</html>
